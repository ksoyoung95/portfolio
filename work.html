<!doctype html>
<html lang="ko">
<head>
  <!-- =====================================================
       01. Meta / Title
  ====================================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Detail</title>

  <!-- =====================================================
       02. Pretendard Font
  ====================================================== -->
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <!-- =====================================================
       03. Work CSS
  ====================================================== -->
  <link rel="stylesheet" href="./css/work.css" />
</head>

<body>
  <main class="workDetailPage" id="top">
    <!-- =====================================================
         04. Top Bar
         - 뒤로가기 버튼
         - Portfolio 텍스트
    ====================================================== -->
    <section class="workTopBar">
      <div class="workContainer workTopBarInner">
        <button class="workBackBtn" type="button" id="backBtn" aria-label="뒤로가기">
          <img src="./images/profile/ioc/Expand_left.png" alt="" aria-hidden="true" />
        </button>
        <span class="workTopLabel">Portfolio</span>
      </div>
    </section>

    <!-- =====================================================
         05. Work Intro
         - 카테고리
         - 클라이언트
         - 제목
         - 메타 정보
         - 컬러칩
    ====================================================== -->
    <section class="workIntro">
      <div class="workContainer">
        <p class="workCategory" id="workCategory">E-commerce / Promotion</p>

        <div class="workTitleGroup">
          <p class="workClient" id="workClient">[현대디에프]</p>
          <h1 class="workMainTitle" id="workTitle">프로젝트 제목</h1>
        </div>

        <div class="workMetaGrid">
          <div class="workMetaItem">
            <span class="workMetaLabel">ROLE</span>
            <p class="workMetaValue" id="workRole">Detailed Page, Graphic</p>
          </div>

          <div class="workMetaItem">
            <span class="workMetaLabel">CONTRIBUTION</span>
            <p class="workMetaValue" id="workContribution">100%</p>
          </div>

          <div class="workMetaItem">
            <span class="workMetaLabel">TOOLS</span>
            <p class="workMetaValue" id="workTools">PS / FIGMA</p>
          </div>
        </div>

        <div class="workColorSection">
          <h2 class="workSectionSubTitle">Color</h2>
          <div class="workColorList" id="workColors"></div>
        </div>
      </div>
    </section>

    <!-- =====================================================
         06. Detailed Image
         - PC / MO 반응형 상세 이미지
         - gif / video도 확장 가능
    ====================================================== -->
    <section class="workImageSection">
      <div class="workContainer workImageContainer">
        <h2 class="workSectionSubTitle workDetailImageTitle">Detailed Image</h2>
      </div>

      <div class="workFullImageWrap" id="workFullImageWrap"></div>
    </section>

    <!-- =====================================================
         07. Top Button
    ====================================================== -->
    <a class="workFloatingTop" href="#top" aria-label="맨 위로" id="workTopBtn">
      <img src="./images/profile/ioc/Expand_up.png" alt="" aria-hidden="true" />
    </a>
  </main>

  <!-- =====================================================
       08. JS
       - 상세 데이터 먼저
       - 상세 로직 나중
  ====================================================== -->
  <script src="./js/workdata.js"></script>
  <script src="./js/work.js"></script>
</body>
</html>
